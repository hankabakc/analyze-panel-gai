services:
  postgres:
    image: postgres:17-alpine
    container_name: analyzepanel-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - analyzepanel-network

networks:
  analyzepanel-network:
    driver: bridge

volumes:
  postgres_data:
